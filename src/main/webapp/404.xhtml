<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/templates/storeLayout.xhtml">
    <ui:define name="title">Page Not Found</ui:define>

    <ui:define name="content">
        <main class="not-found-shell">
            <section class="not-found-card">
                <span class="not-found-code">404</span>
                <h1>Page not found</h1>
                <p>The page you requested is unavailable or may have been moved. Use the buttons below to continue browsing the store.</p>

                <div class="not-found-actions">
                    <h:outputLink value="#{request.contextPath}/index.xhtml" styleClass="not-found-link primary">Go to Home</h:outputLink>
                    <h:outputLink value="#{request.contextPath}/content/page.xhtml?slug=shipping" styleClass="not-found-link secondary">View Store Info</h:outputLink>
                </div>
            </section>
        </main>
    </ui:define>
</ui:composition>
