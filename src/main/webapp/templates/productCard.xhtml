<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">
    <article class="product-card">
        <div class="product-card-media">
            <h:panelGroup rendered="#{homePageBean.hasDiscount(product)}" layout="block" styleClass="product-badge">Sale</h:panelGroup>
            <h:outputLink value="#{request.contextPath}/product.xhtml?id=#{product.id}" styleClass="product-card-link">
                <h:graphicImage value="#{homePageBean.resolveMediaUrl(product.imageUrl)}" alt="#{product.name}"/>
            </h:outputLink>
        </div>
        <div class="product-info">
            <h3 class="product-title">
                <h:outputLink value="#{request.contextPath}/product.xhtml?id=#{product.id}" styleClass="product-title-link">#{product.name}</h:outputLink>
            </h3>
            <div class="product-price-stack">
                <h:panelGroup rendered="#{homePageBean.hasDiscount(product)}">
                    <span class="old-price">#{homePageBean.formatPrice(product.comparePrice)}</span>
                </h:panelGroup>
                <span class="new-price">#{homePageBean.productPriceLabel(product)}</span>
            </div>
            <h:panelGroup rendered="#{product.hasVariants}">
                <div class="product-variant-preview">
                    <ui:repeat value="#{homePageBean.getProductVariants(product)}" var="variant">
                        <span class="variant-pill">#{variant.name}</span>
                    </ui:repeat>
                </div>
            </h:panelGroup>
            <h:panelGroup rendered="#{product.hasVariants}">
                 <p:commandButton id="buyNowBtn" value="Buy Now" actionListener="#{homePageBean.openPurchaseDialog(product)}"
                                 update=":mainForm:purchaseDialog" process="@this"
                                 oncomplete="PF('purchaseDialogWidget').show()" styleClass="catalog-card-button product-card-action"/>
            </h:panelGroup>
            <h:panelGroup rendered="#{not product.hasVariants}">
                <p:commandButton value="Add to Cart" action="#{homePageBean.addProductToCart(product)}"
                                 update=":mainForm:messages :mainForm:cartDrawerContent :mainForm:cartBadge" process="@this"
                                 oncomplete="toggleCartDrawer(true)" styleClass="catalog-card-button product-card-action"/>
            </h:panelGroup>
        </div>
    </article>
</ui:composition>
