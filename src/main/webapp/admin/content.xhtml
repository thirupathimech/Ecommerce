<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <div class="card policy-admin-card">
        <div class="policy-admin-layout">
            <aside class="policy-admin-sidebar">
                <div class="policy-admin-panel policy-admin-nav-panel">
                    <div class="policy-admin-panel-head policy-admin-nav-head">
                        <span class="policy-admin-panel-label">Pages</span>
                        <h4>Content pages</h4>
                    </div>

                    <div class="policy-admin-page-menu">
                        <ui:repeat value="#{contentPageBean.pages}" var="page">
                            <p:commandButton value="#{page.title}"
                                             actionListener="#{contentPageBean.selectPage(page.key)}"
                                             process="@this"
                                             update=":mainForm"
                                             icon="pi pi-file-edit"
                                             styleClass="policy-admin-menu-btn #{contentPageBean.selectedPageKey eq page.key ? 'active' : ''}"/>
                        </ui:repeat>
                    </div>
                </div>
            </aside>

            <section class="policy-admin-main">
                <div class="policy-admin-panel policy-admin-editor-panel">
                    <div class="policy-admin-editor-head">
                        <div>
                            <span class="policy-admin-panel-label">Editor</span>
                            <h4>#{contentPageBean.selectedPageTitle}</h4>
                        </div>

                        <div class="policy-admin-editor-actions">
                            <p:commandButton value="Save Content"
                                             action="#{contentPageBean.saveForm}"
                                             update=":mainForm:messages"
                                             icon="pi pi-save"
                                             styleClass="policy-admin-save-btn"/>
                        </div>
                    </div>

                    <div class="policy-admin-editor-shell">
                        <p:textEditor value="#{contentPageBean.editorHtml}" height="460" secure="false"/>
                    </div>
                </div>

                <div class="policy-admin-panel policy-admin-preview-panel">
                    <div class="policy-admin-panel-head">
                        <span class="policy-admin-panel-label">Preview</span>
                        <h4>#{contentPageBean.selectedPageTitle}</h4>
                    </div>

                    <div class="policy-admin-preview-surface">
                        <div class="policy-admin-preview-frame">
                            <div class="policy-admin-preview-topbar">
                                <span></span><span></span><span></span>
                            </div>
                            <div class="policy-page-card policy-admin-preview-card">
                                <div class="policy-page-hero policy-admin-preview-hero">
                                    <div class="policy-page-header">
                                        <span class="policy-eyebrow">Store information</span>
                                        <h1>#{contentPageBean.selectedPageTitle}</h1>
                                    </div>
                                </div>
                                <div class="policy-page-body policy-admin-preview-body">
                                    <h:outputText value="#{contentPageBean.editorHtml}" escape="false"/>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</ui:composition>
