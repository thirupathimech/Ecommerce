<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
    <h:body>
        <div class="grid">
            <div class="field">
                <label>Title *</label>
                <p:inputText value="#{adminBean.sliderForm.title}"/>
            </div>
            <div class="field">
                <label>Subtitle</label>
                <p:inputText value="#{adminBean.sliderForm.subtitle}"/>
            </div>
            <div class="field">
                <label>Sort Order *</label>
                <p:inputNumber value="#{adminBean.sliderForm.sortOrder}" decimalPlaces="0"/>
            </div>
            <div class="field full">
                <label>Slider Image *</label>
                <p:inputText value="#{adminBean.sliderForm.imageUrl}" readonly="true"/>
                <p:commandButton type="button" value="Select from Files" icon="pi pi-images" onclick="PF('filePicker').show()">
                    <p:ajax event="click" listener="#{adminBean.openFilePickerForSlider}" update=":mainForm:filePickerTable :mainForm:messages"/>
                </p:commandButton>
                <small>#{adminBean.previewLabel(adminBean.sliderForm.imageUrl)}</small>
            </div>
            <div class="field">
                <label>Status</label>
                <p:selectBooleanCheckbox value="#{adminBean.sliderForm.active}" itemLabel="Active"/>
            </div>
        </div>
        <div style="margin-top: 12px; display:flex; gap:8px;">
            <p:commandButton value="Save Slider" action="#{adminBean.saveSlider}" update=":mainForm"/>
            <p:commandButton value="Reset" action="#{adminBean.resetSliderForm}" process="@this" update=":mainForm" styleClass="ui-button-secondary"/>
        </div>
        <p:dataTable value="#{adminBean.sliders}" var="sItem" paginator="true" rows="6" style="margin-top:12px;">
            <p:column headerText="Image"><h:graphicImage value="#{adminBean.resolveMediaUrl(sItem.imageUrl)}" styleClass="thumb"/></p:column>
            <p:column headerText="Title"><h:outputText value="#{sItem.title}"/></p:column>
            <p:column headerText="Order"><h:outputText value="#{sItem.sortOrder}"/></p:column>
            <p:column headerText="Status"><span class="status-pill #{sItem.active ? 'active' : 'inactive'}">#{sItem.active ? 'Active' : 'Inactive'}</span></p:column>
            <p:column headerText="Action" style="width:120px;"><p:commandButton value="Select" action="#{adminBean.editSlider(sItem)}" update=":mainForm" oncomplete="PF('filePicker').hide()" process="@this"/></p:column>
        </p:dataTable>
    </h:body>
</html>
