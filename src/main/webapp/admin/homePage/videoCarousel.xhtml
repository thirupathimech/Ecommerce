<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <div class="grid">
        <div class="field">
            <label>Title *</label>
            <p:inputText value="#{videoCarouselBean.videoCarouselForm.title}"/>
        </div>
        <div class="field">
            <label>Sort Order *</label>
            <p:inputNumber value="#{videoCarouselBean.videoCarouselForm.sortOrder}" decimalPlaces="0"/>
        </div>
        <div class="field">
            <label>Status</label>
            <p:selectBooleanCheckbox value="#{videoCarouselBean.videoCarouselForm.active}" itemLabel="Active"/>
        </div>

        <div class="field full">
            <label>Videos * (one per line)</label>
            <p:inputTextarea value="#{videoCarouselBean.videoCarouselForm.videoUrls}" rows="5" autoResize="false"/>
            <p:commandButton type="button" value="Choose Video" icon="pi pi-video" onclick="PF('filePicker').show()">
                <p:ajax event="click" listener="#{videoCarouselBean.openFilePickerForVideoCarouselVideo}" update=":mainForm:filePickerTable :mainForm:messages"/>
            </p:commandButton>
            <small>Choose video multiple times. Each selected file is appended as a new line.</small>
        </div>
    </div>

    <div style="margin-top: 12px; display:flex; gap:8px;">
        <p:commandButton value="Save Video" action="#{videoCarouselBean.saveForm}" update=":mainForm"/>
        <p:commandButton value="Reset" action="#{videoCarouselBean.resetForm}" process="@this" update=":mainForm" styleClass="ui-button-secondary"/>
    </div>

    <p:dataTable value="#{videoCarouselBean.videoCarouselItems}" var="vItem" paginatorPosition="bottom" rows="6" style="margin-top:12px;">
        <p:column headerText="Title"><h:outputText value="#{vItem.title}"/></p:column>
        <p:column headerText="Videos"><h:outputText value="#{videoCarouselBean.getVideoCount(vItem)}"/> files</p:column>
        <p:column headerText="Order"><h:outputText value="#{vItem.sortOrder}"/></p:column>
        <p:column headerText="Status"><span class="status-pill #{vItem.active ? 'active' : 'inactive'}">#{vItem.active ? 'Active' : 'Inactive'}</span></p:column>
        <p:column headerText="Action" style="width:170px;">
            <p:commandButton value="Edit" action="#{videoCarouselBean.editForm(vItem)}" process="@this" update=":mainForm" style="margin-right:6px;"/>
            <p:commandButton value="Delete" action="#{videoCarouselBean.deleteForm(vItem)}" process="@this" update=":mainForm" styleClass="ui-button-danger"/>
        </p:column>
    </p:dataTable>        
</ui:composition>
