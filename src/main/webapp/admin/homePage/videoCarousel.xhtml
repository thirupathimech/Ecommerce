<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
    <h:body>
        <style>
            .video-carousel-module {
                --card-width: 220px;
                --card-radius: 16px;
                --shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
                --bg: #f7f9fc;
                --text: #0f172a;
                --muted: #6b7280;
                background: var(--bg);
                border-radius: 20px;
                padding: 1rem;
                margin-top: 1rem;
            }
            .video-carousel-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: .8rem;
                gap: .8rem;
            }
            .video-carousel-header h4 {
                margin: 0;
                font-size: 1.1rem;
                color: var(--text);
            }
            .video-carousel-header p {
                margin: 0.3rem 0 0;
                color: var(--muted);
                font-size: 0.88rem;
            }
            .video-scroll-controls {
                display: flex;
                gap: .5rem;
            }
            .video-scroll-btn {
                border: none;
                width: 2.2rem;
                height: 2.2rem;
                border-radius: 999px;
                background: #fff;
                box-shadow: 0 4px 12px rgba(15, 23, 42, 0.12);
                cursor: pointer;
            }
            .video-carousel-track {
                display: flex;
                gap: 1rem;
                overflow-x: auto;
                padding: .35rem .25rem .75rem;
            }
            .video-card {
                position: relative;
                flex: 0 0 var(--card-width);
                height: 360px;
                border-radius: var(--card-radius);
                overflow: hidden;
                cursor: pointer;
                background: #dbeafe;
            }
            .video-card img {
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
            }
            .video-card-overlay {
                position: absolute;
                inset: 0;
                background: linear-gradient(to top, rgba(2, 6, 23, .65), rgba(2, 6, 23, .12));
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .play-btn {
                width: 3.2rem;
                height: 3.2rem;
                border-radius: 999px;
                background: rgba(255,255,255,.92);
                color: #0f172a;
                display: flex;
                align-items: center;
                justify-content: center;
                pointer-events: none;
                box-shadow: 0 8px 20px rgba(0,0,0,.24);
            }
            .video-title {
                position: absolute;
                left: 0;
                right: 0;
                bottom: 0;
                color: #fff;
                padding: .8rem;
                font-size: .88rem;
            }
            .video-modal {
                position: fixed;
                inset: 0;
                background: rgba(2, 6, 23, .75);
                z-index: 9999;
                display: none;
                align-items: center;
                justify-content: center;
                padding: 1rem;
            }
            .video-modal.open {
                display: flex;
            }
            .video-modal-content {
                width: min(92vw, 420px);
                position: relative;
            }
            .video-modal video {
                width: 100%;
                max-height: 80vh;
                border-radius: 16px;
                background: #000;
            }
            .video-modal-close,.video-mute-btn {
                position: absolute;
                border: none;
                border-radius: 999px;
                background: rgba(15, 23, 42, .72);
                color: #f8fafc;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .video-modal-close {
                top: .5rem;
                right: .5rem;
                width: 2.2rem;
                height: 2.2rem;
            }
            .video-mute-btn {
                right: .5rem;
                bottom: .75rem;
                padding: 0 .8rem;
                height: 2.2rem;
            }
            @media (max-width: 768px) {
                .video-carousel-header {
                    flex-direction: column;
                    align-items: flex-start;
                }
                .video-card {
                    flex-basis: 180px;
                    height: 310px;
                }
            }
        </style>

        <div class="grid">
            <div class="field">
                <label>Title *</label>
                <p:inputText value="#{adminBean.videoCarouselForm.title}"/>
            </div>
            <div class="field">
                <label>Sort Order *</label>
                <p:inputNumber value="#{adminBean.videoCarouselForm.sortOrder}" decimalPlaces="0"/>
            </div>
            <div class="field">
                <label>Status</label>
                <p:selectBooleanCheckbox value="#{adminBean.videoCarouselForm.active}" itemLabel="Active"/>
            </div>

            <div class="field full">
                <label>Videos * (one per line)</label>
                <p:inputTextarea value="#{adminBean.videoCarouselForm.videoUrls}" rows="5" autoResize="false"/>
                <p:commandButton type="button" value="Choose Video" icon="pi pi-video" onclick="PF('filePicker').show()">
                    <p:ajax event="click" listener="#{adminBean.openFilePickerForVideoCarouselVideo}" update=":mainForm:filePickerTable :mainForm:messages"/>
                </p:commandButton>
                <small>Choose video multiple times. Each selected file is appended as a new line.</small>
            </div>
        </div>

        <div style="margin-top: 12px; display:flex; gap:8px;">
            <p:commandButton value="Save Video" action="#{adminBean.saveVideoCarouselItem}" update=":mainForm"/>
            <p:commandButton value="Reset" action="#{adminBean.resetVideoCarouselForm}" process="@this" update=":mainForm" styleClass="ui-button-secondary"/>
        </div>

        <p:dataTable value="#{adminBean.videoCarouselItems}" var="vItem" paginatorPosition="bottom" rows="6" style="margin-top:12px;">
            <p:column headerText="Title"><h:outputText value="#{vItem.title}"/></p:column>
            <p:column headerText="Videos"><h:outputText value="#{adminBean.getVideoCount(vItem)}"/> files</p:column>
            <p:column headerText="Order"><h:outputText value="#{vItem.sortOrder}"/></p:column>
            <p:column headerText="Status"><span class="status-pill #{vItem.active ? 'active' : 'inactive'}">#{vItem.active ? 'Active' : 'Inactive'}</span></p:column>
            <p:column headerText="Action" style="width:170px;">
                <p:commandButton value="Edit" action="#{adminBean.editVideoCarouselItem(vItem)}" process="@this" update=":mainForm" style="margin-right:6px;"/>
                <p:commandButton value="Delete" action="#{adminBean.deleteVideoCarouselItem(vItem)}" process="@this" update=":mainForm" styleClass="ui-button-danger"/>
            </p:column>
        </p:dataTable>        
    </h:body>
</html>
