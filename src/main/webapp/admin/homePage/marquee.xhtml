<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:outputStylesheet>
        .marquee-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        }

        .header-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        }
    </h:outputStylesheet>
    <h:body>
        <div class="marquee-header">
            <div></div> <!-- left spacer -->

            <div class="header-actions">
                <p:commandButton icon="pi pi-save"
                                 value="Save Marquee"
                                 action="#{adminBean.saveMarquee}"
                                 process="@form"
                                 update=":mainForm :mainForm:messages"/>

                <p:commandButton icon="pi pi-times"
                                 value="Reset"
                                 action="#{adminBean.resetMarqueeForm}"
                                 process="@this"
                                 update=":mainForm"
                                 styleClass="ui-button-secondary"/>
            </div>
        </div>
        <div class="marquee-builder">
            <div class="card">
                <div class="card-body">
                    <h3>Marquee Builder</h3>
                    <div class="builder-grid">
                        <div class="control-row content-row">
                            <label>Content</label>
                            <div class="inline-input">
                                <p:inputText value="#{adminBean.marqueeItemInput}" placeholder="Enter marquee text"/>
                                <p:commandButton value="Add" action="#{adminBean.addMarqueeItem}" update=":mainForm:homePageTabView:marqueePanel :mainForm:messages" process="@parent"/>
                            </div>
                        </div>

                        <div class="control-row">
                            <label>Direction</label>
                            <h:selectOneMenu value="#{adminBean.marqueeForm.direction}">
                                <f:selectItem itemLabel="Right → Left" itemValue="rtl"/>
                                <f:selectItem itemLabel="Left → Right" itemValue="ltr"/>
                                <f:selectItem itemLabel="Top → Bottom" itemValue="ttb"/>
                                <f:selectItem itemLabel="Bottom → Top" itemValue="btt"/>
                                <p:ajax update=":mainForm:homePageTabView:marqueePanel"/>
                            </h:selectOneMenu>
                        </div>

                        <div class="control-row knob-row">
                            <label>Speed: #{adminBean.marqueeForm.speedSeconds}s</label>
                            <p:knob value="#{adminBean.marqueeForm.speedSeconds}" min="5" max="30" step="1" showLabel="true" foregroundColor="#173676" backgroundColor="#d9e1f7" height="70px">
                                <p:ajax event="change" update=":mainForm:homePageTabView:marqueePanel"/>
                            </p:knob>
                        </div>

                        <p:outputPanel id="backgroundConfigWrapper" layout="block">

                            <!-- Background Mode -->
                            <div class="control-row">
                                <p:outputLabel for="bgMode" value="Background mode"/>
                                <h:selectOneMenu id="bgMode"
                                                 value="#{adminBean.marqueeForm.backgroundMode}">
                                    <f:selectItem itemLabel="Solid" itemValue="solid"/>
                                    <f:selectItem itemLabel="Gradient" itemValue="gradient"/>

                                    <p:ajax process="@this"
                                            update="backgroundConfigWrapper :mainForm:homePageTabView:marqueePanel"/>
                                </h:selectOneMenu>
                            </div>

                            <!-- SOLID MODE -->
                            <h:panelGroup rendered="#{adminBean.marqueeForm.backgroundMode eq 'solid'}"
                                          layout="block"
                                          styleClass="control-row">

                                <p:outputLabel for="solidColor" value="Solid color"/>

                                <p:colorPicker id="solidColor"
                                               value="#{adminBean.marqueeForm.solidColor}"
                                               format="hex">
                                    <p:ajax event="change"
                                            process="@this"
                                            update=":mainForm:homePageTabView:marqueePanel"/>
                                </p:colorPicker>
                            </h:panelGroup>


                            <!-- GRADIENT MODE -->
                            <h:panelGroup rendered="#{adminBean.marqueeForm.backgroundMode eq 'gradient'}"
                                          layout="block"
                                          styleClass="control-row">

                                <p:outputLabel value="Gradient colors (2–5)"/>

                                <div class="inline-input">
                                    <p:inputNumber value="#{adminBean.gradientColorCount}"
                                                   decimalPlaces="0"
                                                   minValue="2"
                                                   maxValue="5"/>

                                    <p:commandButton value="Apply"
                                                     action="#{adminBean.applyGradientColorCount}"
                                                     process="@parent"
                                                     update="backgroundConfigWrapper :mainForm:homePageTabView:marqueePanel"/>
                                </div>

                                <h:panelGroup rendered="#{adminBean.gradientColorCount ge 1}">
                                    <p:colorPicker value="#{adminBean.gradientColor1}" format="hex"><p:ajax listener="#{adminBean.applyGradientColorCount}" update=":mainForm:homePageTabView:marqueePanel"/></p:colorPicker>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{adminBean.gradientColorCount ge 2}">
                                    <p:colorPicker value="#{adminBean.gradientColor2}" format="hex"><p:ajax listener="#{adminBean.applyGradientColorCount}" update=":mainForm:homePageTabView:marqueePanel"/></p:colorPicker>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{adminBean.gradientColorCount ge 3}">
                                    <p:colorPicker value="#{adminBean.gradientColor3}" format="hex"><p:ajax listener="#{adminBean.applyGradientColorCount}" update=":mainForm:homePageTabView:marqueePanel"/></p:colorPicker>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{adminBean.gradientColorCount ge 4}">
                                    <p:colorPicker value="#{adminBean.gradientColor4}" format="hex"><p:ajax listener="#{adminBean.applyGradientColorCount}" update=":mainForm:homePageTabView:marqueePanel"/></p:colorPicker>
                                </h:panelGroup>
                                <h:panelGroup rendered="#{adminBean.gradientColorCount ge 5}">
                                    <p:colorPicker value="#{adminBean.gradientColor5}" format="hex"><p:ajax listener="#{adminBean.applyGradientColorCount}" update=":mainForm:homePageTabView:marqueePanel"/></p:colorPicker>
                                </h:panelGroup>

                            </h:panelGroup>

                        </p:outputPanel>

                        <div class="control-row knob-row">
                            <label>Font size: #{adminBean.marqueeForm.fontSizePx}px</label>
                            <p:knob value="#{adminBean.marqueeForm.fontSizePx}" min="8" max="60" step="1" showLabel="true" foregroundColor="#173676" backgroundColor="#d9e1f7" height="70px">
                                <p:ajax event="change" update=":mainForm:homePageTabView:marqueePanel"/>
                            </p:knob>
                        </div>

                        <div class="control-row knob-row">
                            <label>Font weight: #{adminBean.marqueeFontWeightValue}</label>
                            <p:knob value="#{adminBean.marqueeFontWeightValue}" min="400" max="800" step="100" showLabel="true" foregroundColor="#173676" backgroundColor="#d9e1f7" height="70px">
                                <p:ajax event="change" update=":mainForm:homePageTabView:marqueePanel"/>
                            </p:knob>
                        </div>

                        <div class="control-row">
                            <label>Text color</label>
                            <p:colorPicker value="#{adminBean.marqueeForm.textColor}" format="hex">
                                <p:ajax update=":mainForm:homePageTabView:marqueePanel"/>
                            </p:colorPicker>
                        </div>

                        <div class="control-row toggle-row">
                            <label>Pause on hover</label>
                            <p:selectBooleanCheckbox value="#{adminBean.marqueeForm.pauseOnHover}">
                                <p:ajax update=":mainForm:homePageTabView:marqueePanel"/>
                            </p:selectBooleanCheckbox>
                        </div>

                        <div class="control-row toggle-row">
                            <label>Active</label>
                            <p:selectBooleanCheckbox value="#{adminBean.marqueeForm.active}"/>
                        </div>
                    </div>
                </div>
            </div>

            <p:outputPanel id="marqueePanel" styleClass="card preview-card">
                <div class="card-body">
                    <h3>Items</h3>
                    <ul class="items-list">
                        <ui:repeat value="#{adminBean.marqueeItems}" var="item" varStatus="status">
                            <li>
                                <span>#{item}</span>
                                <p:commandButton value="Remove" action="#{adminBean.removeMarqueeItem(status.index)}" update=":mainForm:homePageTabView:marqueePanel" process="@this" styleClass="remove-item-btn"/>
                            </li>
                        </ui:repeat>
                    </ul>

                    <h3>Live Preview</h3>
                    <div class="marquee-preview #{adminBean.marqueeForm.pauseOnHover ? 'pause-on-hover' : ''}" style="background:#{adminBean.buildMarqueePreviewBackground()};">
                        <div class="marquee-track #{adminBean.marqueeAnimationClass}" style="animation-duration:#{adminBean.marqueeForm.speedSeconds}s; font-size:#{adminBean.marqueeForm.fontSizePx}px;
                             font-weight:#{adminBean.marqueeFontWeightValue};
                             color:#{adminBean.marqueeForm.textColor};">
                            <ui:repeat value="#{adminBean.loopedMarqueeItems}" var="previewItem">
                                <span class="marquee-item">#{previewItem}</span>
                            </ui:repeat>
                        </div>
                    </div>

                    <h3 style="margin-top:10px;">Saved Marquee Configurations</h3>
                    <p:dataTable value="#{adminBean.marqueeConfigs}" var="mItem" rows="5" paginator="true" paginatorPosition="bottom">
                        <p:column headerText="ID"><h:outputText value="#{mItem.id}"/></p:column>
                        <p:column headerText="Direction"><h:outputText value="#{mItem.direction}"/></p:column>
                        <p:column headerText="Speed"><h:outputText value="#{mItem.speedSeconds}s"/></p:column>
                        <p:column headerText="Status"><h:outputText value="#{mItem.active ? 'Active' : 'Inactive'}"/></p:column>
                        <p:column headerText="Action">
                            <p:commandButton icon="pi pi-pencil" action="#{adminBean.editMarquee(mItem)}" update="mainForm:homePageTabView:marqueeTab" process="@this"/>
                            <p:spacer width="8px"/>
                            <p:commandButton icon="pi pi-delete-left" action="#{adminBean.deleteMarqueeConfig(mItem)}" update="mainForm:homePageTabView" process="@this" styleClass="ui-button-danger">
                                <p:confirm type="popup" header="Confirmation"
						message="Do you want to delete this record?"
						icon="pi pi-info-circle"
						yesButtonLabel="Delete Me!"
						yesButtonClass="bg-red-600 text-white"
						yesButtonIcon="pi pi-trash"
						noButtonLabel="Keep this!"
						noButtonClass="bg-green-600 text-white"
						noButtonIcon="pi pi-heart"/>
                            </p:commandButton>
                        </p:column>
                    </p:dataTable>
                </div>
            </p:outputPanel>
        </div>

        <style>
            .marquee-builder {
                display: grid;
                gap: 14px;
                grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
            }
            .builder-grid {
                display: grid;
                gap: 10px;
            }
            .control-row {
                display: grid;
                gap: 6px;
            }
            .knob-row {
                justify-items: center;
                text-align: center;
            }
            .inline-input {
                display: flex;
                gap: 8px;
                align-items: center;
            }
            .toggle-row {
                grid-template-columns: 1fr auto;
                align-items: center;
            }
            .preview-card h3 {
                margin: 6px 0 10px;
            }
            .items-list {
                list-style: none;
                padding: 0;
                margin: 0 0 14px;
                display: grid;
                gap: 8px;
                max-height: 180px;
                overflow: auto;
            }
            .items-list li {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 9px 10px;
                border-radius: 8px;
                border: 1px solid #dce4f7;
                background: #f8faff;
            }
            .remove-item-btn {
                border: none;
                background: #ffe9e9;
                color: #af2b2b;
                border-radius: 6px;
            }
            .marquee-preview {
                position: relative;
                min-height: 110px;
                border-radius: 12px;
                overflow: hidden;
                padding: 16px;
                display: flex;
                align-items: center;
            }
            .marquee-track {
                display: flex;
                align-items: center;
                gap: 22px;
                width: max-content;
                min-width: 100%;
                will-change: transform;
                transform: translate3d(0,0,0);
            }
            .marquee-track.vertical {
                flex-direction: column;
                align-items: stretch;
                width: 100%;
            }
            .marquee-item {
                white-space: nowrap;
                padding: 8px 14px;
                border-radius: 999px;
            }
            .marquee-track.vertical .marquee-item {
                white-space: normal;
                text-align: center;
            }
            @keyframes marquee-horizontal-rtl {
                0% {
                    transform: translate3d(0, 0, 0);
                }
                100% {
                    transform: translate3d(-50%, 0, 0);
                }
            }
            @keyframes marquee-horizontal-ltr {
                0% {
                    transform: translate3d(-50%, 0, 0);
                }
                100% {
                    transform: translate3d(0, 0, 0);
                }
            }
            @keyframes marquee-vertical-ttb {
                0% {
                    transform: translate3d(0, -50%, 0);
                }
                100% {
                    transform: translate3d(0, 0, 0);
                }
            }
            @keyframes marquee-vertical-btt {
                0% {
                    transform: translate3d(0, 0, 0);
                }
                100% {
                    transform: translate3d(0, -50%, 0);
                }
            }
            .marquee-track.anim-horizontal-rtl {
                animation: marquee-horizontal-rtl linear infinite;
            }
            .marquee-track.anim-horizontal-ltr {
                animation: marquee-horizontal-ltr linear infinite;
            }
            .marquee-track.anim-vertical-ttb {
                animation: marquee-vertical-ttb linear infinite;
            }
            .marquee-track.anim-vertical-btt {
                animation: marquee-vertical-btt linear infinite;
            }
            .marquee-preview.pause-on-hover:hover .marquee-track {
                animation-play-state: paused;
            }
            @media (max-width: 920px) {
                .marquee-builder {
                    grid-template-columns: 1fr;
                }
            }
        </style>
    </h:body>
</html>
