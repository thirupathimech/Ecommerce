<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <div class="card">
        <div class="card-body">
            <p:tabView id="homePageTabView" style="width: 80vw" activeIndex="#{adminHomePageSettingsBean.homeTabIndex}">
                
                <p:ajax event="tabChange" listener="#{adminHomePageSettingsBean.onHomeTabChange}" process="@this" update=":mainForm"/>
                
                <p:tab id="homeSectionTab" title="Home Section Order">
                    <ui:include src="homeSectionOrder.xhtml"/>
                </p:tab>

                <p:tab id="homeSliderTab" title="Home Slider">
                    <ui:include src="homeSlider.xhtml"/>
                </p:tab>

                <p:tab id="divSectionTab" title="Div Section">
                    <ui:include src="divSection.xhtml"/>
                </p:tab>

                <p:tab id="videoCarouselTab" title="Video Carousel">
                    <ui:include src="videoCarousel.xhtml"/>
                </p:tab>

                <p:tab id="collectionsGroupTab" title="Collections Group">
                    <ui:include src="collectionsGroup.xhtml"/>
                </p:tab>
                
                <p:tab id="marqueeTab" title="Marquee">
                    <ui:include src="marquee.xhtml"/>
                </p:tab>
                
            </p:tabView>
        </div>
    </div>
</ui:composition>
