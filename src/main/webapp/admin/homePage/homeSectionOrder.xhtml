<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <h:form id="homeSectionOrderForm">
        <div class="card">
            <div class="card-body">
                <h4 style="margin-top:0;">Home Section Order</h4>
                <p style="margin-top:0.25rem; color:#6b7280;">
                    Pick and order exact records
                </p>

                <p:pickList id="sectionPickList"
                            value="#{homeSectionOrderBean.homeSectionOrderPickList}"
                            var="item"
                            itemValue="#{item}"
                            itemLabel="#{homeSectionOrderBean.resolveHomeSectionOrderLabel(item)}"
                            showSourceFilter="true"
                            showTargetFilter="true"
                            showCheckbox="true"
                            responsive="true"
                            sourceFilterPlaceholder="Available records"
                            targetFilterPlaceholder="Home page order">
                </p:pickList>

                <div style="margin-top:1rem; display:flex; gap:.75rem;">
                    <p:commandButton value="Save Order" icon="pi pi-save" ajax="false"
                                     actionListener="#{homeSectionOrderBean.saveForm}"
                                     update="homeSectionOrderForm :growl"/>
                    <p:commandButton value="Refresh List" icon="pi pi-refresh"
                                     actionListener="#{homeSectionOrderBean.loadHomeSectionOrderPickList}"
                                     update="homeSectionOrderForm"
                                     styleClass="ui-button-secondary"/>
                </div>

                <h5 style="margin:1rem 0 .5rem;">Current selected order</h5>
                <ol style="margin:0; padding-left:1.25rem;">
                    <ui:repeat value="#{homeSectionOrderBean.homeSectionOrderPickList.target}" var="selectedItem">
                        <li style="margin:.2rem 0;">#{homeSectionOrderBean.resolveHomeSectionOrderLabel(selectedItem)}</li>
                    </ui:repeat>
                </ol>
            </div>
        </div>
    </h:form>
</ui:composition>
