<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <div class="grid">
        <div class="field full">
            <label>Heading *</label>
            <p:inputText value="#{homeDivSectionBean.homeDivSectionForm.heading}"/>
        </div>

        <div class="field full">
            <label>Description *</label>
            <p:inputTextarea value="#{homeDivSectionBean.homeDivSectionForm.description}" autoResize="true" rows="4"/>
        </div>

        <div class="field">
            <label>Button Label</label>
            <p:inputText value="#{homeDivSectionBean.homeDivSectionForm.buttonLabel}"/>
        </div>

        <div class="field">
            <label>Button Link</label>
            <p:inputText value="#{homeDivSectionBean.homeDivSectionForm.buttonLink}"/>
        </div>

        <div class="field">
            <label>Sort Order *</label>
            <p:inputNumber value="#{homeDivSectionBean.homeDivSectionForm.sortOrder}" decimalPlaces="0"/>
        </div>

        <div class="field">
            <label>Image Side *</label>
            <p:selectOneMenu value="#{homeDivSectionBean.homeDivSectionForm.imageSide}">
                <f:selectItems value="#{homeDivSectionBean.imageSideOptions}"/>
            </p:selectOneMenu>
        </div>

        <div class="field">
            <label>Content Alignment *</label>
            <p:selectOneMenu value="#{homeDivSectionBean.homeDivSectionForm.contentAlign}">
                <f:selectItems value="#{homeDivSectionBean.contentAlignOptions}"/>
            </p:selectOneMenu>
        </div>

        <div class="field">
            <label>Status</label>
            <p:selectBooleanCheckbox value="#{homeDivSectionBean.homeDivSectionForm.active}" itemLabel="Active"/>
        </div>

        <div class="field full">
            <label>Image *</label>
            <p:inputText value="#{homeDivSectionBean.homeDivSectionForm.imageUrl}" readonly="true"/>
            <p:commandButton type="button" value="Choose Image" icon="pi pi-image" onclick="PF('filePicker').show()">
                <p:ajax event="click" listener="#{homeDivSectionBean.openFilePicker(homeDivSectionBean, 'HOME_DIV_SECTION_IMAGE')}" update=":mainForm:filePickerTable :mainForm:messages"/>
            </p:commandButton>
            <small>#{homeDivSectionBean.previewLabel(homeDivSectionBean.homeDivSectionForm.imageUrl)}</small>
        </div>
    </div>

    <div style="margin-top: 12px; display:flex; gap:8px;">
        <p:commandButton value="Save Div Section" action="#{homeDivSectionBean.saveForm}" update=":mainForm"/>
        <p:commandButton value="Reset" action="#{homeDivSectionBean.resetForm}" process="@this" update=":mainForm" styleClass="ui-button-secondary"/>
    </div>

    <p:dataTable value="#{homeDivSectionBean.homeDivSections}" var="dItem" paginatorPosition="bottom" rows="6" style="margin-top:12px;">
        <p:column headerText="Image"><h:graphicImage value="#{homeDivSectionBean.resolveMediaUrl(dItem.imageUrl)}" styleClass="thumb"/></p:column>
        <p:column headerText="Heading"><h:outputText value="#{dItem.heading}"/></p:column>
        <p:column headerText="Image Side"><h:outputText value="#{dItem.imageSide}"/></p:column>
        <p:column headerText="Content Align"><h:outputText value="#{dItem.contentAlign}"/></p:column>
        <p:column headerText="Order"><h:outputText value="#{dItem.sortOrder}"/></p:column>
        <p:column headerText="Status"><span class="status-pill #{dItem.active ? 'active' : 'inactive'}">#{dItem.active ? 'Active' : 'Inactive'}</span></p:column>
        <p:column headerText="Action" style="width:170px;">
            <p:commandButton value="Edit" action="#{homeDivSectionBean.editForm(dItem)}" process="@this" update=":mainForm" style="margin-right:6px;"/>
            <p:commandButton value="Delete" action="#{homeDivSectionBean.deleteForm(dItem)}" process="@this" update=":mainForm" styleClass="ui-button-danger"/>
        </p:column>
    </p:dataTable>
</ui:composition>
