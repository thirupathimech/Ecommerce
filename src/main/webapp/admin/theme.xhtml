<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui">
    <div class="theme-admin-shell">
        <section class="theme-admin-section">
            <div class="theme-config-field">
                <label for="themePrimaryColor">Application theme color</label>
                <p:colorPicker id="themePrimaryColor" value="#{themeConfigBean.themeForm.primaryColor}" format="hex"/>
            </div>
            <div class="theme-admin-actions">
                <p:commandButton value="Save theme" actionListener="#{themeConfigBean.saveForm}" update=":mainForm" process=":mainForm" icon="pi pi-save"/>
            </div>
        </section>
    </div>
</ui:composition>
