<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/templates/storeLayout.xhtml">
    <ui:define name="title">#{empty contentViewBean.currentPage ? 'Content Page' : contentViewBean.currentPage.title}</ui:define>

    <ui:define name="content">
        <main class="policy-page-shell">
            <section class="policy-page-card">
                <h:link outcome="/index" value="&#8592; Back to Home" styleClass="policy-back-link"/>
                <div class="policy-page-header">
                    <span class="policy-eyebrow">Store information</span>
                    <h1>#{contentViewBean.currentPage.title}</h1>
                    <p>These details are loaded from the admin content editor and shown here in the storefront.</p>
                </div>

                <nav class="policy-page-links" aria-label="Policy quick links">
                    <ui:repeat value="#{contentViewBean.pages}" var="page">
                        <h:link outcome="/content/page" value="#{page.title}" styleClass="#{contentViewBean.isSelected(page.slug) ? 'active' : ''}">
                            <f:param name="slug" value="#{page.slug}"/>
                        </h:link>
                    </ui:repeat>
                </nav>

                <div class="policy-page-body">
                    <h:outputText value="#{contentViewBean.currentPage.htmlContent}" escape="false"/>
                </div>
            </section>
        </main>
    </ui:define>
</ui:composition>
