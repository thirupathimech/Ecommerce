<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/templates/storeLayout.xhtml">
    <ui:define name="title">#{empty contentViewBean.currentPage ? 'Content Page' : contentViewBean.currentPage.title}</ui:define>
    <ui:define name="head">
        <h:outputStylesheet library="css" name="index.css"/>
    </ui:define>
    <ui:define name="content">
        <main class="policy-page-shell">
            <section class="policy-page-card">
                <div class="policy-page-hero">
                    <div class="policy-page-header">
                        <span class="policy-eyebrow">Store information</span>
                        <h1>#{contentViewBean.currentPage.title}</h1>
                    </div>

                    <div class="policy-page-actions">
                         <h:outputLink value="#{request.contextPath}/index.xhtml" styleClass="policy-back-link">Back to Home</h:outputLink>
                    </div>
                </div>

                <div class="policy-page-layout">
                    <aside class="policy-page-sidebar">
                        <div class="policy-page-nav-card">
                            <div class="policy-page-nav-header">
                                <span class="policy-nav-label">Browse pages</span>
                                <p>Jump between policy pages quickly.</p>
                            </div>

                            <nav class="policy-page-links" aria-label="Policy quick links">
                                <ui:repeat value="#{contentViewBean.pages}" var="page">
                                    <h:outputLink value="#{request.contextPath}/content/page.xhtml?slug=#{page.slug}" styleClass="#{contentViewBean.isSelected(page.slug) ? 'active' : ''}">#{page.title}</h:outputLink>
                                </ui:repeat>
                            </nav>
                        </div>
                    </aside>

                    <article class="policy-page-content-card">
                        <div class="policy-page-content-head">
                            <span class="policy-content-label">Current page</span>
                            <h2>#{contentViewBean.currentPage.title}</h2>
                        </div>

                        <div class="policy-page-body">
                            <h:outputText value="#{contentViewBean.currentPage.htmlContent}" escape="false"/>
                        </div>
                    </article>
                </div>
            </section>
        </main>
    </ui:define>
</ui:composition>
