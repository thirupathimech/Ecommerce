<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/templates/storeLayout.xhtml">
    <ui:define name="title">#{empty contentViewBean.currentPage ? 'Content Page' : contentViewBean.currentPage.title}</ui:define>
    <ui:define name="head">
        <h:outputStylesheet name="index.css" library="css"/>
    </ui:define>
    <ui:define name="content">
        <main class="policy-page-shell">
            <section class="policy-page-card">
                <div class="policy-page-hero">
                    <div class="policy-page-header">
                        <span class="policy-eyebrow">Store information</span>
                        <h1>#{contentViewBean.currentPage.title}</h1>
                        <p>Everything you need to know about this policy, in one place.</p>
                    </div>
                    <div class="policy-page-actions">
                        <h:outputLink value="#{request.contextPath}/index.xhtml" styleClass="policy-back-link">Back to store</h:outputLink>
                    </div>
                </div>

                <div class="policy-page-layout policy-page-layout--single">

                    <article class="policy-page-content-card">
                        <div class="policy-page-content-head">
                            <h2>#{contentViewBean.currentPage.title}</h2>
                        </div>

                        <div class="policy-page-body">
                            <h:outputText value="#{contentViewBean.currentPage.htmlContent}" escape="false"/>
                        </div>
                    </article>
                </div>
            </section>
        </main>
    </ui:define>
</ui:composition>
