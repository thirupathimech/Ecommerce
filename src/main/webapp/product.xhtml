<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/templates/storeLayout.xhtml">
    <ui:define name="title">Product</ui:define>
    <ui:define name="head">
        <h:outputStylesheet name="index.css" library="css"/>
        <h:outputStylesheet name="index-tablet.css" library="css"/>
        <h:outputStylesheet name="index-mobile.css" library="css"/>
        <h:outputStylesheet name="index-mobile-tablets.css" library="css"/>
    </ui:define>
    <ui:define name="content">
        <main class="container catalog-page-shell">
            <h:panelGroup rendered="#{not empty storefrontBean.selectedProduct}" layout="block" styleClass="product-detail-shell">
                <div class="product-detail-media">
                    <h:graphicImage value="#{homePageBean.resolveMediaUrl(storefrontBean.selectedProduct.imageUrl)}" alt="#{storefrontBean.selectedProduct.name}"/>
                </div>
                <div class="product-detail-content">
                    <p class="catalog-eyebrow">Product</p>
                    <h1>#{storefrontBean.selectedProduct.name}</h1>
                    <p class="product-detail-price">#{homePageBean.productPriceLabel(storefrontBean.selectedProduct)}</p>
                    <p>#{storefrontBean.selectedProduct.description}</p>
                </div>
            </h:panelGroup>
            <h:panelGroup rendered="#{empty storefrontBean.selectedProduct}" layout="block" styleClass="catalog-empty-state">
                <h2>Product not found</h2>
                <p>Please choose a valid product menu.</p>
            </h:panelGroup>
        </main>
    </ui:define>
</ui:composition>
