<!DOCTYPE html>
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                template="/templates/storeLayout.xhtml">
    <ui:define name="title">All Products</ui:define>
    <ui:define name="head"><h:outputStylesheet name="index.css" library="css"/></ui:define>
    <ui:define name="content">
        <main class="container catalog-page-shell">
            <section class="catalog-hero">
                <h1>All Products</h1>
            </section>
            <section class="products-grid is-box catalog-grid-shell">
                <ui:repeat value="#{storefrontBean.allActiveProducts}" var="product">
                    <ui:include src="/templates/productCard.xhtml">
                        <ui:param name="product" value="#{product}"/>
                    </ui:include>
                </ui:repeat>
            </section>
        </main>
    </ui:define>
</ui:composition>
